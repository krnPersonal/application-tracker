services:
  mysql:
    image: mysql:8.4
    container_name: application-tracker-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: application_tracker
      MYSQL_USER: application_tracker_app
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
