spring:
  application:
    name: application-tracker-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/application_tracker?createDatabaseIfNotExist=true&serverTimezone=UTC}
    username: ${DB_USERNAME:application_tracker_app}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  security:
    jwt-secret: ${JWT_SECRET:change-this-secret-to-a-256-bit-production-value}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
